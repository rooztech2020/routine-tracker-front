<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Routine & Habit Tracker</title>
    <!-- Link to the compiled CSS -->
    <link href="./output.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </head>
  <body
    class="bg-gray-100 text-gray-800 font-sans antialiased pb-10 min-h-screen"
  >
    <!-- DESKTOP GRID LAYOUT -->
    <div class="max-w-7xl mx-auto p-4 lg:p-8 lg:grid lg:grid-cols-3 lg:gap-8">
      <!-- Main Column (Tasks) -->
      <div class="lg:col-span-2">
        <div class="bg-gray-900 text-white p-6 rounded-3xl shadow-md mb-6">
          <h1 class="text-3xl font-bold mb-1">My Daily Routine</h1>
          <p class="text-gray-400 text-sm">
            Focus: C# .NET, SQL, & German (A2.1-B1)
          </p>
        </div>

        <div id="task-list" class="space-y-3">
          <!-- Tasks will be injected here -->
        </div>
      </div>

      <!-- Sidebar Column (Progress & Habits) -->
      <div class="mt-8 lg:mt-0 lg:col-span-1 space-y-6">
        <!-- Progress Card -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-4">Daily Progress</h2>
          <div class="flex justify-between text-sm font-semibold mb-2">
            <span>Completion</span>
            <span id="progress-text">0%</span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-3">
            <div
              id="progress-bar"
              class="bg-green-500 h-3 rounded-full transition-all duration-500"
              style="width: 0%"
            ></div>
          </div>
        </div>

        <!-- Habit Tracker -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-1">Habit Tracker</h2>
          <p class="text-xs text-gray-500 mb-4">Last 30 Days Activity</p>

          <div id="habit-grid" class="grid grid-cols-7 gap-2">
            <!-- Squares will be injected here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Congrats Modal -->
    <div
      id="congrats-modal"
      class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
    >
      <div
        class="bg-white p-8 rounded-2xl shadow-2xl text-center w-11/12 max-w-sm"
      >
        <div class="text-5xl mb-4">🏆</div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">You Did It!</h2>
        <p class="text-gray-600 mb-6">10 hours crushed.</p>
        <button
          onclick="
            document.getElementById('congrats-modal').classList.add('hidden')
          "
          class="bg-green-600 text-white px-6 py-2 rounded-full font-semibold w-full hover:bg-green-700 transition"
        >
          Awesome
        </button>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
